<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <div class="signin-container">
  <h2>Sign In</h2>
  <form [formGroup]="signinForm" (ngSubmit)="onSubmit()" novalidate>
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" />
      <div class="error" *ngIf="submitted && f.email.invalid">
        <small *ngIf="f.email.errors?.required">Email is required.</small>
        <small *ngIf="f.email.errors?.email">Enter a valid email.</small>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" />
      <div class="error" *ngIf="submitted && f.password.invalid">
        <small *ngIf="f.password.errors?.required">Password is required.</small>
        <small *ngIf="f.password.errors?.pattern">Password must be at least 6 characters and include a number.</small>
      </div>
    </div>

    <button type="submit">Sign In</button>
  </form>
</div>

</body>
</html>
