<section class="projects">
  <header>
    <h1>Projects</h1>
    <p>
      A selection of projects from my coursework and personal learning, showcasing my growth as a full stack developer.
    </p>
  </header>

  <div class="projects-grid">
    <article class="project-card" *ngFor="let project of projects">
      <h2>{{ project.title }}</h2>
      <p>{{ project.description }}</p>

      <h3>Technologies</h3>
      <ul class="tech-list">
        <li *ngFor="let tech of project.technologies">{{ tech }}</li>
      </ul>

      <h3>What I Learned</h3>
      <p>{{ project.learning }}</p>

      <a *ngIf="project.link"
         [href]="project.link"
         target="_blank"
         rel="noopener"
         class="project-link">
        View Project
      </a>
    </article>
  </div>
</section>
